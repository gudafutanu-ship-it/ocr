<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>小説本文OCR</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
  <style>
    :root { --bg:#0f172a; --card:#111827; --ink:#f8fafc; --muted:#94a3b8; --line:#334155; --btn:#2563eb; --bad:#ef4444; --ok:#22c55e; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; background:linear-gradient(180deg,#0f172a,#020617); color:var(--ink); }
    .wrap { max-width:900px; margin:0 auto; padding:18px 14px 80px; }
    h1 { font-size:24px; margin:8px 0 6px; }
    p { color:var(--muted); line-height:1.6; }
    .card { background:rgba(17,24,39,.92); border:1px solid var(--line); border-radius:18px; padding:16px; margin:14px 0; box-shadow:0 10px 30px rgba(0,0,0,.25); }
    label { display:block; font-weight:700; margin:10px 0 6px; }
    input, textarea, button { width:100%; border-radius:14px; border:1px solid var(--line); font-size:16px; }
    input { padding:13px; background:#020617; color:var(--ink); }
    button { padding:14px; margin-top:10px; background:var(--btn); color:white; font-weight:800; border:none; }
    button.secondary { background:#334155; }
    button.danger { background:#7f1d1d; }
    button:disabled { opacity:.5; }
    textarea { min-height:360px; padding:14px; background:#020617; color:#e5e7eb; line-height:1.8; resize:vertical; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .status { white-space:pre-wrap; background:#020617; border:1px solid var(--line); border-radius:14px; padding:12px; color:#cbd5e1; min-height:48px; }
    .bar { height:12px; background:#020617; border:1px solid var(--line); border-radius:999px; overflow:hidden; margin-top:10px; }
    .bar > div { height:100%; width:0%; background:var(--ok); transition:width .2s; }
    .thumbs { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-top:10px; }
    .thumb { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#020617; }
    .thumb canvas { width:100%; display:block; }
    .thumb div { padding:8px; color:var(--muted); font-size:13px; }
    .small { font-size:13px; color:var(--muted); }
    @media(max-width:640px){ .row{grid-template-columns:1fr;} h1{font-size:22px;} }
  </style>
</head>
<body>
<div class="wrap">
  <h1>小説本文OCR</h1>
  <p>文庫本の見開きスキャンPDFから、本文だけを抽出します。ルビ・手書き・斜線・ページ番号は無視する前提です。</p>

  <div class="card">
    <label>Worker URL</label>
    <input id="workerUrl" placeholder="https://xxxx.xxxx.workers.dev">
    <label>パスワード</label>
    <input id="password" type="password" inputmode="numeric" placeholder="Workerに設定したパスワード">
    <label>PDF</label>
    <input id="pdfFile" type="file" accept="application/pdf">
    <div class="row">
      <button id="renderBtn">PDFを読み込む</button>
      <button id="ocrBtn" disabled>本文抽出開始</button>
    </div>
    <div class="bar"><div id="bar"></div></div>
    <div id="status" class="status">準備中</div>
  </div>

  <div class="card">
    <div class="row">
      <button class="secondary" id="copyBtn">結果をコピー</button>
      <button class="secondary" id="saveBtn">TXT保存</button>
    </div>
    <textarea id="result" placeholder="ここに本文が入ります"></textarea>
  </div>

  <div class="card">
    <b>ページ確認</b>
    <p class="small">見開き1枚ずつ表示します。明らかに不要な斜線ページがあれば、OCR後にその部分を結果欄で削除してください。</p>
    <div id="thumbs" class="thumbs"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const $ = id => document.getElementById(id);
const workerUrlEl = $("workerUrl");
const passwordEl = $("password");
const pdfFileEl = $("pdfFile");
const renderBtn = $("renderBtn");
const ocrBtn = $("ocrBtn");
const statusEl = $("status");
const barEl = $("bar");
const resultEl = $("result");
const thumbsEl = $("thumbs");

let pageImages = [];
workerUrlEl.value = localStorage.getItem("novel_ocr_worker_url") || "";
passwordEl.value = localStorage.getItem("novel_ocr_password") || "";

function setStatus(msg){ statusEl.textContent = msg; }
function setProgress(done,total){ barEl.style.width = total ? Math.round(done/total*100)+"%" : "0%"; }

renderBtn.onclick = async () => {
  try {
    const file = pdfFileEl.files[0];
    if (!file) return alert("PDFを選んでください。祖");
    pageImages = [];
    thumbsEl.innerHTML = "";
    resultEl.value = "";
    ocrBtn.disabled = true;
    setProgress(0,1);
    setStatus("PDFを画像化しています…");

    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

    for (let i=1; i<=pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport0 = page.getViewport({ scale: 1 });
      const targetWidth = 1600;
      const scale = Math.min(2.2, Math.max(1.2, targetWidth / viewport0.width));
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { alpha:false });
      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);
      await page.render({ canvasContext: ctx, viewport }).promise;
      const image = canvas.toDataURL("image/jpeg", 0.86);
      pageImages.push({ pageNumber:i, image });

      const box = document.createElement("div");
      box.className = "thumb";
      const small = document.createElement("canvas");
      const sctx = small.getContext("2d");
      small.width = 240;
      small.height = Math.round(240 * canvas.height / canvas.width);
      sctx.drawImage(canvas, 0, 0, small.width, small.height);
      const cap = document.createElement("div");
      cap.textContent = `見開き ${i}`;
      box.appendChild(small);
      box.appendChild(cap);
      thumbsEl.appendChild(box);

      setProgress(i, pdf.numPages);
      setStatus(`PDF画像化中：${i} / ${pdf.numPages}`);
    }
    setStatus(`読み込み完了：${pdf.numPages}枚の見開き画像を作成しました。`);
    ocrBtn.disabled = false;
  } catch (e) {
    setStatus("エラー：" + e.message);
  }
};

ocrBtn.onclick = async () => {
  const workerUrl = workerUrlEl.value.trim().replace(/\/$/, "");
  const password = passwordEl.value.trim();
  if (!workerUrl) return alert("Worker URLを入力してください。");
  if (!password) return alert("パスワードを入力してください。");
  if (!pageImages.length) return alert("先にPDFを読み込んでください。");

  localStorage.setItem("novel_ocr_worker_url", workerUrl);
  localStorage.setItem("novel_ocr_password", password);

  ocrBtn.disabled = true;
  renderBtn.disabled = true;
  resultEl.value = "";
  setProgress(0, pageImages.length);

  const outputs = [];
  try {
    for (let i=0; i<pageImages.length; i++) {
      const p = pageImages[i];
      setStatus(`本文抽出中：見開き ${p.pageNumber} / ${pageImages.length}\n少し待つ場合があります。`);
      const res = await fetch(workerUrl, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ password, image:p.image, pageNumber:p.pageNumber })
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "OCRエラー");
      if (data.text && data.text.trim()) outputs.push(data.text.trim());
      resultEl.value = outputs.join("\n\n");
      setProgress(i+1, pageImages.length);
    }
    setStatus("完了しました。TXT保存またはコピーできます。");
  } catch(e) {
    setStatus("エラー：" + e.message);
  } finally {
    ocrBtn.disabled = false;
    renderBtn.disabled = false;
  }
};

$("copyBtn").onclick = async () => {
  await navigator.clipboard.writeText(resultEl.value);
  setStatus("コピーしました。");
};

$("saveBtn").onclick = () => {
  const blob = new Blob([resultEl.value], { type:"text/plain;charset=utf-8" });
  const a = document.createElement("a");
  const name = "novel_ocr_" + new Date().toISOString().slice(0,10) + ".txt";
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
};
</script>
</body>
</html>
